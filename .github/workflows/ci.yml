name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.4.29"

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dev deps
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  # ── 2. Type-check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dev deps
        run: uv sync --frozen

      - name: mypy
        run: uv run mypy api/

  # ── 3. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (pytest — no Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dev deps
        run: uv sync --frozen

      - name: Run mock-safe tests
        run: |
          uv run pytest \
            --ignore=tests/test_phase1_db.py \
            --ignore=tests/test_phase7_modelserver.py \
            -x -q
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-root-token

  # ── 4. Redaction test ────────────────────────────────────────────────────────
  redaction:
    name: Redaction test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dev deps
        run: uv sync --frozen

      - name: Run redaction tests
        run: uv run pytest tests/test_phase2_redaction.py -v
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dev-root-token

  # ── 5. Build images ──────────────────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        run: docker build -f api/Dockerfile -t maintainers-api:ci .

      - name: Build modelserver image
        run: docker build -f modelserver/Dockerfile -t maintainers-modelserver:ci .

  # ── 6. Integration + eval suite ─────────────────────────────────────────────
  eval:
    name: Eval suite (full stack)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, redaction, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dev deps
        run: uv sync --frozen

      - name: Install eval deps
        run: uv pip install -r evals/requirements.txt

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Wait for services
        run: |
          for svc in \
            "http://localhost:8000/health" \
            "http://localhost:8001/health"; do
            for i in $(seq 1 30); do
              curl -sf "$svc" && break || sleep 2
            done
          done

      - name: Promote eval user to admin
        run: |
          docker compose exec -T db psql -U copilot -d copilot_db \
            -c "INSERT INTO users (email, hashed_password, role)
                SELECT 'eval@example.com', 'placeholder', 'admin'
                WHERE NOT EXISTS (SELECT 1 FROM users WHERE email='eval@example.com');"
        continue-on-error: true

      - name: Seed RAG corpus
        run: |
          uv run python scripts/seed_rag_corpus.py
        env:
          API_URL: http://localhost:8000
          EVAL_EMAIL: eval@example.com
          EVAL_PASSWORD: eval_password_123

      - name: Promote seeded user to admin
        run: |
          docker compose exec -T db psql -U copilot -d copilot_db \
            -c "UPDATE users SET role='admin' WHERE email='eval@example.com';"

      - name: Run classification eval
        run: |
          uv run python evals/run_classification_eval.py
        env:
          MODELSERVER_URL: http://localhost:8001
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin_dev

      - name: Run RAG eval
        run: |
          uv run python evals/run_rag_eval.py
        env:
          API_URL: http://localhost:8000
          MODELSERVER_URL: http://localhost:8001
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin_dev
          EVAL_EMAIL: eval@example.com
          EVAL_PASSWORD: eval_password_123

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            eval_classification_report.json
            eval_rag_report.json

      - name: Tear down stack
        if: always()
        run: docker compose down -v
