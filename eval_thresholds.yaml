# Evaluation thresholds — all values must be > 0.
# CI hard-fails if any metric falls below these values.
# Updated after each training run with actual measured results.

ragas:
  faithfulness: 0.70
  answer_relevancy: 0.70
  context_precision: 0.65

retrieval:
  hit_at_5: 0.70
  mrr_at_10: 0.50

classifier:
  # Deployed model: DistilBERT fine-tune (test macro-F1 = 0.8867)
  # Thresholds are 2pp below measured to allow for natural variance.
  f1_macro: 0.86       # DistilBERT must stay above this
  classical_f1: 0.83   # TF-IDF + LR measured 0.8404
  dl_f1: 0.87          # DistilBERT measured 0.8867
  llm_f1: 0.89         # GPT-4o-mini measured 0.9030
